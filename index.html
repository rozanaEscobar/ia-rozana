<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompts Rozana Escobar • Prompts Completos e Poderosos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .prompt-card:hover { transform: translateY(-6px); }
        textarea { font-family: ui-monospace, monospace; font-size: 0.85rem; line-height: 1.5; }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 to-purple-50 min-h-screen">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-pink-600 to-purple-600 bg-clip-text text-transparent">Prompts Rozana Escobar</h1>
            <p class="text-2xl text-gray-700 mt-4">Prompts LONGOS e COMPLETOS • Prontos para Grok, ChatGPT, Gemini e qualquer IA</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-12" id="menu"></div>
        <div id="content" class="space-y-16"></div>
    </div>

    <script>
        const categories = [
            {
                id: "influencer",
                icon: "🎥",
                title: "Vídeos com Influencer por Nicho",
                prompts: [
                    "Você é um roteirista profissional de vídeos para afiliados Shopee. Crie um roteiro COMPLETO e detalhado para um vídeo de 15-20 segundos com influencer feminina vestindo [produto]. Especifique: cenário ideal, iluminação, sequência exata de cenas (segundo a segundo), gancho nos primeiros 3 segundos, demonstração do caimento e qualidade, close-ups importantes, benefícios emocionais e práticos, tom de voz, música sugerida e CTA forte no final com preço e link. Forneça também 5 variações diferentes de gancho para testar.",
                    "Crie roteiro para influencer plus size usando [produto] em casa. Foque em conforto, valorização do corpo, confiança e praticidade. Inclua estrutura segundo a segundo, ângulos de câmera, texto sugerido na tela e 4 variações completas."
                ]
            },
            {
                id: "reels",
                icon: "📱",
                title: "Instagram Reels & Stories",
                prompts: [
                    "Você é especialista em conteúdo viral do Instagram. Crie um roteiro completo para Reels de 15 segundos vendendo [produto]. Inclua: gancho irresistível nos primeiros 3 segundos (forneça 8 opções diferentes), sequência de cenas, texto grande na tela (sugira o texto exato para cada segundo), música trending recomendada, transição, demonstração clara do benefício, prova social se possível e CTA forte no final com link na bio. Formate tudo de forma clara e fácil de copiar."
                ]
            },
            {
                id: "whatsapp",
                icon: "💬",
                title: "WhatsApp & Grupos",
                prompts: [
                    "Escreva uma mensagem natural, persuasiva e de alto conversão para grupo de WhatsApp vendendo [produto]. Máximo 4-5 linhas, tom de amiga indicando um achado, destaque o benefício principal, inclua preço com desconto, prova social e CTA claro com link da Shopee. Depois forneça também: follow-up dia 1, follow-up com urgência, resposta para objeção 'é caro' e script de áudio de 30 segundos."
                ]
            },
            {
                id: "ia",
                icon: "🤖",
                title: "Vídeos IA Curtos (Grok/Kling/Runway)",
                prompts: [
                    "Você é expert em prompts para vídeo IA (Kling, Grok, Runway, Luma). Crie um prompt EXTREMAMENTE detalhado e otimizado para gerar um vídeo vertical 9:16 de exatamente 8-10 segundos do [produto]. Especifique: câmera (movimento, ângulos, zoom), iluminação, fundo, qualidade (4K, realista, cinematic), texto aparecendo na tela, timing exato, estilo visual e tudo que ajuda a IA a gerar um vídeo profissional e comercial de alta conversão. Forneça 3 variações (girando, unboxing, transformação)."
                ]
            },
            {
                id: "copy",
                icon: "✍️",
                title: "Copies & Legendas Persuasivas",
                prompts: [
                    "Você é um copywriter especialista em vendas diretas. Usando as melhores técnicas (AIDA, PAS, Storytelling, 4U), escreva: 12 headlines poderosas + 1 descrição longa completa de produto (900-1500 caracteres) + legenda emocional para Reels/Carrossel para [produto]. Inclua prova social, benefícios emocionais, escassez e CTA forte."
                ]
            }
            // Adicione as outras categorias com prompts longos da mesma forma
        ];

        // (O resto do JavaScript continua igual ao anterior - menu clicável + copy)
        function renderMenu() {
            const menu = document.getElementById('menu');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-5 bg-white rounded-3xl shadow flex items-center gap-4 hover:shadow-xl transition-all`;
                btn.innerHTML = `<span class="text-4xl">${cat.icon}</span><span class="font-semibold">${cat.title}</span>`;
                btn.onclick = () => showCategory(cat);
                menu.appendChild(btn);
            });
        }

        function showCategory(cat) {
            const content = document.getElementById('content');
            let html = `<h2 class="text-4xl font-bold text-center mb-10">${cat.icon} ${cat.title}</h2><div class="grid md:grid-cols-2 gap-8">`;
            
            cat.prompts.forEach((prompt, i) => {
                const id = `${cat.id}_${i}`;
                html += `
                    <div class="prompt-card bg-white p-7 rounded-3xl shadow">
                        <textarea id="${id}" class="w-full h-64 p-6 border rounded-2xl">${prompt}</textarea>
                        <button onclick="copyPrompt('${id}')" class="mt-6 w-full bg-gradient-to-r from-pink-600 to-purple-600 text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-2">
                            <i class="fa-solid fa-copy"></i> Copiar Prompt Completo
                        </button>
                    </div>`;
            });
            html += `</div>`;
            content.innerHTML = html;
        }

        window.copyPrompt = function(id) {
            const ta = document.getElementById(id);
            ta.select();
            document.execCommand('copy');
            const btn = event.currentTarget;
            const original = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-check"></i> Copiado!`;
            setTimeout(() => btn.innerHTML = original, 2200);
        };

        renderMenu();
        setTimeout(() => showCategory(categories[0]), 300);
    </script>
</body>
</html>
