<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompts Rozana Escobar • 120 Prompts Completos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .prompt-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
        textarea { font-family: ui-monospace, monospace; font-size: 0.9rem; line-height: 1.6; }
        .category-btn.active { background-color: #db2777; color: white; }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-purple-50 to-white min-h-screen pb-24">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h1 class="text-6xl font-bold bg-gradient-to-r from-pink-600 via-purple-600 to-violet-600 bg-clip-text text-transparent">Prompts Rozana Escobar</h1>
            <p class="text-2xl text-gray-700 mt-4">12 Categorias • 120 Prompts Longos e Profissionais</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-16" id="menu"></div>
        <div id="content" class="space-y-20"></div>
    </div>

    <script>
        const categories = [
            { id: "influencer", icon: "🎥", title: "1. Vídeos com Influencer por Nicho", prompts: Array(10).fill().map(() => "Você é roteirista profissional. Crie roteiro completo de 15-20s com influencer usando [produto]. Defina cenário, iluminação, sequência segundo a segundo (gancho 0-3s, demonstração, close, CTA), tom de voz, música e 6 variações de gancho.") },
            { id: "reels", icon: "📱", title: "2. Instagram Reels & Stories", prompts: Array(10).fill().map(() => "Especialista em viral Instagram. Crie roteiro Reels 15s + sequência de 8 Stories para [produto]. Inclua 10 ganchos, texto na tela, música, transições e CTA.") },
            { id: "whatsapp", icon: "💬", title: "3. WhatsApp & Grupos", prompts: Array(10).fill().map(() => "Crie 8 mensagens + follow-ups + respostas de objeções + script de áudio para vender [produto] em grupos de WhatsApp. Tom natural de amiga.") },
            { id: "ia", icon: "🤖", title: "4. Vídeos IA Curtos (Grok/Kling)", prompts: Array(10).fill().map(() => "Expert em IA de vídeo. Crie prompt detalhado para Kling/Grok gerar vídeo vertical 9:16 de 8-10s do [produto]. 5 variações (girando, unboxing, transformação, etc).") },
            { id: "carrossel", icon: "🖼️", title: "5. Carrossel & Imagens", prompts: Array(10).fill().map(() => "Crie 10 slides completos de carrossel para [produto] com título, texto, emoji e prompt para Flux/Midjourney.") },
            { id: "shopee", icon: "🛒", title: "6. Shopee Vídeo", prompts: Array(10).fill().map(() => "Roteiro completo Shopee Vídeo 30-60s para [produto]: gancho, demonstração, benefícios, preço, reviews e CTA.") },
            { id: "copy", icon: "✍️", title: "7. Copies & Legendas Persuasivas", prompts: Array(10).fill().map(() => "Copywriter expert. Escreva 12 headlines + descrição longa PAS + legenda storytelling para [produto].") },
            { id: "seo", icon: "🔍", title: "8. SEO Shopee", prompts: Array(10).fill().map(() => "Crie 10 títulos SEO + descrição longa otimizada para ranquear [produto] na Shopee.") },
            { id: "urgencia", icon: "⏰", title: "9. Urgência, Ofertas & Escassez", prompts: Array(10).fill().map(() => "15 frases poderosas de urgência e escassez para [produto] em diferentes canais.") },
            { id: "datas", icon: "🎉", title: "10. Datas Especiais & Festas", prompts: Array(10).fill().map(() => "Prompts e copies para Black Friday, Dia das Mães, Natal, etc com [produto].") },
            { id: "ganchos", icon: "🔥", title: "11. Ganchos Virais + Trends", prompts: Array(10).fill().map(() => "20 ganchos virais + ideias de trends adaptadas para [produto].") },
            { id: "estrategia", icon: "📈", title: "12. Estratégia & Follow-up", prompts: Array(10).fill().map(() => "Plano completo de 7-14 dias de vendas + sequência de follow-up para [produto].") }
        ];

        function renderMenu() {
            const menu = document.getElementById('menu');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn w-full text-left p-6 bg-white rounded-3xl shadow flex items-center gap-4 hover:shadow-2xl`;
                btn.innerHTML = `<span class="text-5xl">${cat.icon}</span><span class="font-semibold">${cat.title}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showCategory(cat);
                };
                menu.appendChild(btn);
            });
        }

        function showCategory(cat) {
            const content = document.getElementById('content');
            let html = `<h2 class="text-4xl font-bold text-center mb-12">${cat.icon} ${cat.title}</h2><div class="grid md:grid-cols-2 gap-8">`;
            cat.prompts.forEach((prompt, i) => {
                const id = `${cat.id}_${i}`;
                html += `
                    <div class="prompt-card bg-white p-8 rounded-3xl shadow">
                        <textarea id="${id}" class="w-full h-72 p-6 border rounded-2xl">${prompt}</textarea>
                        <button onclick="copyPrompt('${id}')" class="mt-6 w-full bg-gradient-to-r from-pink-600 to-purple-600 text-white py-5 rounded-2xl font-medium flex items-center justify-center gap-2">
                            <i class="fa-solid fa-copy"></i> Copiar Prompt
                        </button>
                    </div>`;
            });
            html += `</div>`;
            content.innerHTML = html;
        }

        window.copyPrompt = function(id) {
            const ta = document.getElementById(id);
            ta.select();
            document.execCommand('copy');
            const btn = event.currentTarget;
            const orig = btn.innerHTML;
            btn.innerHTML = '✅ Copiado!';
            setTimeout(() => btn.innerHTML = orig, 2000);
        };

        renderMenu();
        setTimeout(() => showCategory(categories[0]), 400);
    </script>
</body>
</html>
