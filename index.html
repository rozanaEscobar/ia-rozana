<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompts Rozana Escobar • 120 Prompts Profissionais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .prompt-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
        textarea { font-family: ui-monospace, monospace; font-size: 0.9rem; line-height: 1.6; }
        .category-btn.active { background-color: #db2777; color: white; }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-purple-50 to-white min-h-screen pb-24">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h1 class="text-6xl font-bold bg-gradient-to-r from-pink-600 via-purple-600 to-violet-600 bg-clip-text text-transparent">Prompts Rozana Escobar</h1>
            <p class="text-2xl text-gray-700 mt-4">12 Categorias • 120 Prompts Únicos, Longos e Detalhados</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-16" id="menu"></div>
        <div id="content" class="space-y-20"></div>
    </div>

    <script>
        const categories = [
            { id: "influencer", icon: "🎥", title: "1. Vídeos com Influencer por Nicho", prompts: [
                "Você é um roteirista profissional de vídeos para afiliados Shopee. Crie um roteiro completo e detalhado para vídeo de 15-20 segundos com influencer feminina vestindo [produto]. Especifique cenário ideal, iluminação, sequência segundo a segundo (gancho 0-3s, demonstração, close, CTA), tom de voz, música sugerida, texto na tela e forneça 6 variações de gancho diferentes.",
                "Crie roteiro para influencer plus size usando [produto] em casa, focando em conforto, valorização do corpo e confiança. Inclua estrutura segundo a segundo e 5 variações de gancho.",
                "Roteiro completo para influencer masculino em ambiente urbano usando [produto], destacando praticidade e estilo.",
                "Vídeo de transformação antes e depois com [produto], mostrando emoção e resultado real.",
                "Roteiro para nicho cozinha: influencer usando [produto] enquanto prepara uma receita.",
                "Roteiro maternidade: praticidade do [produto] no dia a dia com bebê.",
                "Roteiro fitness: usando [produto] após treino, enfatizando durabilidade.",
                "Vídeo unboxing + primeira impressão com influencer.",
                "Roteiro sensual para lingerie/pijama com influencer feminina.",
                "Roteiro de skincare/maquiagem mostrando aplicação e resultado de [produto]."
            ]},
            { id: "reels", icon: "📱", title: "2. Instagram Reels & Stories", prompts: [
                "Especialista em conteúdo viral. Crie roteiro completo para Reels de 15s vendendo [produto] com 10 ganchos diferentes, texto na tela, música trending e CTA forte.",
                "Crie sequência completa de 8 Stories interativos para [produto] (problema → solução → oferta → urgência → CTA).",
                "Reels Before/After com transição perfeita e texto motivacional.",
                "Reels de unboxing rápido e visualmente satisfatório.",
                "Adaptação de trend atual para vender [produto].",
                "Reels ASMR usando [produto].",
                "Reels de depoimento real de cliente.",
                "Reels 'Dia na vida usando [produto]'.",
                "Reels de comparação sutil de qualidade.",
                "Reels + Stories combinados para lançamento de [produto]."
            ]},
            { id: "whatsapp", icon: "💬", title: "3. WhatsApp & Grupos", prompts: [
                "Crie 8 mensagens naturais para grupos de WhatsApp vendendo [produto] com tom de amiga, benefício, preço e CTA.",
                "Sequência de follow-up (dia 1, dia 3 e dia 7) após envio do link.",
                "Respostas prontas para objeções comuns ('é caro', 'vou pensar', 'não preciso').",
                "Script completo de áudio de 30-40 segundos vendendo [produto].",
                "Mensagem com prova social e prints de clientes.",
                "Convite para lista VIP de ofertas.",
                "Mensagem de boas-vindas após compra.",
                "Upsell de produto complementar.",
                "Mensagem de urgência com contagem regressiva.",
                "Mensagem de recuperação de carrinho abandonado."
            ]},
            { id: "ia", icon: "🤖", title: "4. Vídeos IA Curtos (Grok/Kling)", prompts: [
                "Expert em IA de vídeo. Crie prompt detalhado para vídeo vertical 9:16 de 8-10s do [produto] girando com luz suave, zoom e texto na tela.",
                "Prompt para vídeo IA unboxing com mãos femininas e emoção.",
                "Prompt para transformação before/after usando [produto].",
                "Vídeo lifestyle realista do [produto] em uso diário.",
                "Slow motion mostrando textura e caimento do [produto].",
                "Prompt minimalista branco com [produto] flutuando.",
                "Vídeo comparação lado a lado de qualidade.",
                "Prompt ASMR com sons reais e closes detalhados.",
                "Vídeo elegante com partículas de luz.",
                "Prompt sazonal adaptado para [produto]."
            ]},
            { id: "carrossel", icon: "🖼️", title: "5. Carrossel & Imagens", prompts: [
                "Crie 10 slides completos de carrossel para [produto] com título, texto, emoji e prompt para gerar imagem.",
                "Carrossel Before/After em 10 slides emocionais.",
                "Carrossel focado em depoimentos de clientes.",
                "Carrossel detalhando qualidade e acabamento do produto.",
                "Carrossel de oferta com urgência e contagem regressiva."
            ]},
            { id: "shopee", icon: "🛒", title: "6. Shopee Vídeo", prompts: [
                "Roteiro completo para Shopee Vídeo de 30-60s para [produto] otimizado para algoritmo.",
                "Roteiro curto de 15s para Shopee com gancho forte.",
                "Roteiro com demonstração detalhada + benefícios + preço + reviews."
            ]},
            { id: "copy", icon: "✍️", title: "7. Copies & Legendas Persuasivas", prompts: [
                "Usando AIDA, escreva 12 headlines + descrição longa + legenda para Reels de [produto].",
                "Usando PAS, crie descrição completa e legenda storytelling para [produto].",
                "Copy com técnica 4U + prova social para [produto]."
            ]},
            { id: "seo", icon: "🔍", title: "8. SEO Shopee", prompts: [
                "Crie 10 títulos SEO otimizados + descrição longa para [produto] ranquear bem na Shopee.",
                "Descrição completa SEO-friendly com palavras-chave e bullets."
            ]},
            { id: "urgencia", icon: "⏰", title: "9. Urgência, Ofertas & Escassez", prompts: [
                "15 frases poderosas de urgência e escassez para [produto] em diferentes canais.",
                "Mensagens de oferta relâmpago e contagem regressiva."
            ]},
            { id: "datas", icon: "🎉", title: "10. Datas Especiais & Festas", prompts: [
                "Copies e roteiros para Black Friday com [produto].",
                "Adaptação para Dia das Mães, Natal e Dia dos Namorados."
            ]},
            { id: "ganchos", icon: "🔥", title: "11. Ganchos Virais + Trends", prompts: [
                "20 ganchos virais poderosos para Reels vendendo [produto].",
                "Ideias de trends adaptadas para [produto]."
            ]},
            { id: "estrategia", icon: "📈", title: "12. Estratégia & Follow-up", prompts: [
                "Monte um plano completo de 7-14 dias de vendas para [produto] com posts, stories e follow-up.",
                "Sequência completa de follow-up WhatsApp de 30 dias para [produto].",
                "Plano de 14 dias com foco em urgência e recuperação de leads.",
                "Estratégia completa de funil de vendas para [produto].",
                "Plano de follow-up com 5 toques + mensagens de reengajamento."
            ]}
        ];

        // JavaScript (mantém os botões iguais)
        function renderMenu() {
            const menu = document.getElementById('menu');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn w-full text-left p-6 bg-white rounded-3xl shadow flex items-center gap-4 hover:shadow-2xl`;
                btn.innerHTML = `<span class="text-5xl">${cat.icon}</span><span class="font-semibold">${cat.title}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showCategory(cat);
                };
                menu.appendChild(btn);
            });
        }

        function showCategory(cat) {
            const content = document.getElementById('content');
            let html = `<h2 class="text-4xl font-bold text-center mb-12 flex items-center justify-center gap-5">${cat.icon} ${cat.title}</h2><div class="grid md:grid-cols-2 gap-8">`;
            cat.prompts.forEach((prompt, i) => {
                const id = `${cat.id}_${i}`;
                html += `
                    <div class="prompt-card bg-white p-8 rounded-3xl shadow border">
                        <textarea id="${id}" class="w-full h-80 p-6 border rounded-2xl">${prompt}</textarea>
                        <button onclick="copyPrompt('${id}')" class="mt-6 w-full bg-gradient-to-r from-pink-600 to-purple-600 text-white py-5 rounded-2xl font-medium flex items-center justify-center gap-3">
                            <i class="fa-solid fa-copy"></i> Copiar Prompt
                        </button>
                    </div>`;
            });
            html += `</div>`;
            content.innerHTML = html;
            window.scrollTo({ top: 350, behavior: 'smooth' });
        }

        window.copyPrompt = function(id) {
            const ta = document.getElementById(id);
            ta.select();
            document.execCommand('copy');
            const btn = event.currentTarget;
            const original = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-check"></i> Copiado!`;
            setTimeout(() => btn.innerHTML = original, 2200);
        };

        renderMenu();
        setTimeout(() => {
            document.querySelector('.category-btn').classList.add('active');
            showCategory(categories[0]);
        }, 300);
    </script>
</body>
</html>
