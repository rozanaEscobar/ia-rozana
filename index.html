<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompts Rozana Escobar • 300+ Prompts Shopee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .prompt-card:hover { transform: translateY(-6px); }
        textarea { font-family: ui-monospace, monospace; font-size: 0.9rem; line-height: 1.4; }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-purple-50 to-white min-h-screen">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h1 class="text-6xl font-bold bg-gradient-to-r from-pink-600 via-purple-600 to-violet-600 bg-clip-text text-transparent">
                Prompts Rozana Escobar
            </h1>
            <p class="text-2xl text-gray-700 mt-4">Prompts completos prontos para copiar e usar</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

            <!-- 1. VÍDEOS COM INFLUENCER -->
            <div class="bg-white rounded-3xl shadow-2xl p-8">
                <h2 class="text-3xl font-bold mb-6 flex items-center gap-3">🎥 Vídeos com Influencer</h2>
                <div class="space-y-8">
                    <div class="prompt-card bg-gray-50 p-6 rounded-2xl">
                        <textarea id="v1" class="w-full h-40 p-4 border rounded-2xl">Crie um roteiro completo para vídeo de 15-20 segundos com influencer feminina vestindo [produto]. Cenário: quarto bem iluminado com tons rosa. Sequência: 0-3s gancho forte, 3-10s giro 360° mostrando caimento perfeito, 10-15s close nos detalhes e textura, 15-20s CTA com preço e link. Tom confiante e sensual. Inclua 5 variações de gancho.</textarea>
                        <button onclick="copyPrompt('v1')" class="mt-4 w-full bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-2"><i class="fa-solid fa-copy"></i> Copiar Prompt Completo</button>
                    </div>
                </div>
            </div>

            <!-- 2. COPYWRITING PERSUASIVO -->
            <div class="bg-white rounded-3xl shadow-2xl p-8">
                <h2 class="text-3xl font-bold mb-6 flex items-center gap-3">✍️ Copywriting Persuasivo</h2>
                <div class="space-y-8">
                    <div class="prompt-card bg-gray-50 p-6 rounded-2xl">
                        <textarea id="c1" class="w-full h-40 p-4 border rounded-2xl">Escreva 12 headlines irresistíveis usando fórmula AIDA para [produto] na Shopee. Cada headline deve ter: Atenção (gancho forte), Interesse, Desejo (benefício emocional) e Ação (CTA). Foque em escassez e prova social.</textarea>
                        <button onclick="copyPrompt('c1')" class="mt-4 w-full bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-2"><i class="fa-solid fa-copy"></i> Copiar Prompt Completo</button>
                    </div>

                    <div class="prompt-card bg-gray-50 p-6 rounded-2xl">
                        <textarea id="c2" class="w-full h-40 p-4 border rounded-2xl">Crie uma descrição longa e persuasiva de produto (900-1300 caracteres) usando técnica PAS para [produto]. Problema → Agitação → Solução + bullets de benefícios + prova social + oferta + CTA forte no final.</textarea>
                        <button onclick="copyPrompt('c2')" class="mt-4 w-full bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-2"><i class="fa-solid fa-copy"></i> Copiar Prompt Completo</button>
                    </div>
                </div>
            </div>

            <!-- 3. TRÁFEGO PAGO -->
            <div class="bg-white rounded-3xl shadow-2xl p-8">
                <h2 class="text-3xl font-bold mb-6 flex items-center gap-3">💰 Tráfego Pago Shopee</h2>
                <div class="space-y-8">
                    <div class="prompt-card bg-gray-50 p-6 rounded-2xl">
                        <textarea id="t1" class="w-full h-40 p-4 border rounded-2xl">Crie 10 variações de criativos para Shopee Ads de [produto]. Para cada variação informe: Texto Principal, Texto Secundário, Call to Action e descrição da imagem sugerida. Foque em alto CTR e conversão.</textarea>
                        <button onclick="copyPrompt('t1')" class="mt-4 w-full bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-2"><i class="fa-solid fa-copy"></i> Copiar Prompt Completo</button>
                    </div>

                    <div class="prompt-card bg-gray-50 p-6 rounded-2xl">
                        <textarea id="t2" class="w-full h-40 p-4 border rounded-2xl">Monte uma estratégia completa de tráfego pago Shopee para [produto] com orçamento diário de R$80-150. Inclua: tipo de campanhas, públicos-alvo, lances sugeridos, ordem de escala e criativos recomendados.</textarea>
                        <button onclick="copyPrompt('t2')" class="mt-4 w-full bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-2"><i class="fa-solid fa-copy"></i> Copiar Prompt Completo</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="text-center mt-20 text-gray-500">
            Depois de subir no GitHub, atualize a página (Ctrl + F5) para limpar o cache.<br>
            Qualquer problema, me manda print que eu arrumo na hora.
        </div>
    </div>

    <script>
        function copyPrompt(id) {
            const textarea = document.getElementById(id);
            if (!textarea) return;
            
            textarea.select();
            document.execCommand('copy');
            
            const btn = event.currentTarget;
            const original = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-check"></i> Copiado com sucesso!`;
            btn.style.backgroundColor = '#10b981';
            
            setTimeout(() => {
                btn.innerHTML = original;
                btn.style.backgroundColor = '';
            }, 2500);
        }
    </script>
</body>
</html>
